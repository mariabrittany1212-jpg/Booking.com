<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continue</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="topbar">
  Cali Haider
</div>

<div class="container">
  <h2>Continue</h2>

  <p id="showEmail"></p>

  <label>Fav Food</label>
  <input id="food" placeholder="Enter your fav food">

  <button id="btn" onclick="submitData()">Continue</button>
</div>

<script>
const email = localStorage.getItem("email");
document.getElementById("showEmail").innerText = email;

function submitData() {
  const food = document.getElementById("food").value;
  const btn = document.getElementById("btn");

  if (!food) {
    alert("Enter your fav food");
    return;
  }

  btn.innerText = "Loading...";
  btn.disabled = true;

  fetch("/api/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, food })
  });

  setTimeout(() => {
    window.location.href = "index.html";
  }, 12000);
}
</script>

</body>
</html>
